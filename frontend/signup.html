<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Entertainment Recommendation System</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/signup.css">
    </head>
    <body>
        <header>
            
        </header>
        <main>
            <div class="container d-flex justify-content-center align-items-center min-vh-100">
                <div class="row border rounded-5 p-3 bg-white shadow box-area">
                    
                    <div class="col-md-6 rounded-4 d-flex justify-content-center align-items-center flex-column left-box">
                        <div class="row align-items-center">
                            <div class="header-text mb-4">
                                <h2>Create an account</h2>
                                <p>Sign up and get started.</p>
                            </div>
                            <div class="input-group mb-3">
                                <input type="text" class="form-control form-control-lg bg-light fs-6" placeholder="Username">
                            </div>
                            <div class="input-group mb-3">
                                <input type="email" class="form-control form-control-lg bg-light fs-6" placeholder="Email">
                            </div>
                            <div class="input-group mb-5">
                                <input type="password" class="form-control form-control-lg bg-light fs-6" placeholder="Password">
                            </div>
                            
                            <div class="input-group mb-3">
                                <button class="btn btn-lg btn-warning w-100 fs-6">Sign Up</button>
                            </div>
                            <div class="row">
                                <small>Have any account? <a href="signin.html">Sign In</a></small>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 rounded-4 d-flex justify-content-end align-items-center flex-column right-box">
                        <div class="featured-text">
                            <h2 class="text-white" style="font-family:Bebas Neue; font-size: 3.5rem; letter-spacing: 2px; text-transform: uppercase;">rately medianest</h2>
                            <p class="text-white" style="font-weight:bold; font-size: 1.2rem;">All your favorites in one place.</p>
                            <br>
                        </div>
                    </div>

                </div>
            </div>
        </main>
        <footer>

        </footer>

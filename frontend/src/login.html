<!doctype html>
<html lang="en">

<head>
    <title>MediaNest</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
            <div class="container d-flex align-items-center flex-wrap flex-lg-nowrap">

                <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
                    <img src="./assets/logo.png" alt="MediaNest" class="logo">
                    MediaNest
                </a>

                <div class="collapse navbar-collapse w-100 order-3 order-lg-2" id="navbarNav">
                    <ul class="navbar-nav ms-lg-3 mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="watchList.html">WatchList</a></li>
                    </ul>
                </div>

                <div class="d-flex align-items-center gap-2 ms-auto flex-shrink-0 order-2 order-lg-3">

                    <a href="search.html" class="text-secondary hover-primary p-1">
                        <i class="bi bi-search fs-5"></i>
                    </a>

                    <div id="auth-buttons" class="d-flex gap-2 flex-nowrap">
                        <a class="btn btn-outline-primary btn-sm d-none d-md-inline-block text-nowrap"
                            href="login.html">Log
                            In</a>
                        <a class="btn btn-primary btn-sm text-nowrap" href="signup.html">Sign Up</a>
                    </div>

                    <button class="btn btn-outline-secondary rounded-circle p-1 lh-1" id="theme-toggle" type="button">
                        <i class="bi bi-sun-fill fs-5" id="theme-icon"></i>
                    </button>

                    <button class="navbar-toggler border-1 p-1 ms-1.5" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div id="profile-placeholder" class="d-none dropdown">
                        <button class="btn btn-link text-decoration-none dropdown-toggle text-primary p-0" 
                                type="button" 
                                data-bs-toggle="dropdown" 
                                aria-expanded="false">
                            <i class="bi bi-person-circle fs-4"></i>
                            <span id="nav-username" class="ms-1 d-none d-md-inline small fw-semibold"></span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                            <li><a class="dropdown-item py-2" href="profile.html">Profile</a></li>
                            <li><a class="dropdown-item py-2" href="watchList.html">My WatchList</a></li>
                            <li><hr class="dropdown-divider my-1"></li>
                            <li>
                                <button class="dropdown-item py-2 text-danger" onclick="handleLogout()">
                                    Logout
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>
        <main>
            <div class="container d-flex justify-content-center align-items-center min-vh-100">
                <div class="row border rounded-5 p-3 bg-body-tertiary shadow box-area">
                    
                    <div class="col-md-6 rounded-4 d-flex justify-content-center align-items-center flex-column left-box">
                        <div class="row align-items-center">
                            <div class="header-text mb-4">
                                <h2>Sign in with email</h2>
                                <p>Search for movies and check reviews. For free</p>
                            </div>
                            <form id="loginForm" onsubmit="handleLogin(event)">
                                <div class="input-group mb-3">
                                    <input type="email"
                                            id="email"
                                            name="email"
                                            class="form-control form-control-lg fs-6"
                                            placeholder="Email"
                                            autocomplete="email"
                                            required>
                                </div>
                                <div class="input-group mb-2">
                                    <input type="password"
                                            id="password"
                                            name="password"
                                            class="form-control form-control-lg fs-6"
                                            placeholder="Password"
                                            autocomplete="current-password"
                                            required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" onclick="togglePasswordVisibility()">
                                        <i class="bi bi-eye-slash" id="eyeIcon"></i>
                                    </button>
                                </div>
                                <div id="passwordError" class="form-text text-danger d-none mb-2" style="font-size: 0.85rem;"></div>
                                <div class="input-group mb-3">
                                    <button class="btn btn-lg auth-button w-100 fs-6">Sign In</button>
                                </div>
                                <div class="row">
                                    <small>Don't have an account? <a href="signup.html" class="auth-link">Sign Up</a></small>
                                </div>
                            </form>
                        </div>
                        <div class="d-flex align-items-center my-3 w-100">
                            <div style="flex: 1; height: 1.2px; background-color: var(--bs-border-color);"></div>
                            <span class="mx-3 divider-text fw-bold" style="font-size: 0.8rem;">OR</span>
                            <div style="flex: 1; height: 1.2px; background-color: var(--bs-border-color);"></div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12">
                                <div class="d-flex gap-2">
                                    <button class="btn btn-dark d-flex align-items-center justify-content-center py-2 w-50 mb-2 shadow-sm border-0">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-apple me-2" viewBox="0 0 16 16">
                                            <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.202-.029 2.308-1.179c1.106-1.15 1.148-2.316 1.148-2.316M8.077 5.061c.767 0 1.203-.434 1.203-.434s1.337.192 2.287.967c.711.58 1.055 1.446 1.055 1.446s-1.104.534-1.104 1.937c0 1.412 1.187 1.987 1.187 1.987s-.061.336-.319.933c-.317.731-.772 1.507-1.384 1.507-.694 0-1.022-.425-1.933-.425-1.048 0-1.375.436-2.14.436-.59 0-1.213-.747-1.742-1.774-.59-1.149-1.002-2.315-1.002-3.644 0-2.46 1.444-3.268 2.539-3.268.972 0 1.107.429 1.933.429.356 0 .592-.09.81-.196"/>
                                        </svg>
                                        <span class="fw-bold" style="font-size: 0.9rem;">Continue with Apple</span>
                                    </button>
                                    
                                    <button class="btn btn-outline-secondary d-flex btn-google align-items-center justify-content-center py-2 w-50 mb-2 shadow-sm border">
                                        <img src="https://img.icons8.com/color/20/000000/google-logo.png" class="me-2">
                                        <span class="fw-bold" style="font-size: 0.9rem;">Continue with Google</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        
                    </div>

                    <div class="col-md-6 rounded-4 d-flex right-box">
                        <div class="featured-text">
                            <h2 class="text-white" style="font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 2px; text-transform: uppercase;">
                                welcome back!
                            </h2>
                            <p class="text-white" style="font-weight: bold; font-size: 1.2rem;">
                                All your favorites in one place.
                            </p>
                        </div>
                    </div>

                </div>
            </div>
        </main>
        <footer>

        </footer>
        <script type="module" src="./js/main.js"></script>
        <script type="module" src="./js/auth.js"></script>
        <script type="module" src="./js/session.js"></script>
    </body>
</html>

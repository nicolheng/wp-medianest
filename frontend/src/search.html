<!doctype html>
<html lang="en">

<head>
    <title>MediaNest</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
</head>

<body class="d-flex flex-column min-vh-100">
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
            <div class="container d-flex align-items-center flex-wrap flex-lg-nowrap">

                <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
                    <img src="./assets/logo.png" alt="MediaNest" class="logo">
                    MediaNest
                </a>

                <div class="collapse navbar-collapse w-100 order-3 order-lg-2" id="navbarNav">
                    <ul class="navbar-nav ms-lg-3 mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="watchList.html">WatchList</a></li>
                    </ul>
                </div>

                <div class="d-flex align-items-center gap-2 ms-auto flex-shrink-0 order-2 order-lg-3">

                    <a href="search.html" class="text-secondary hover-primary p-1">
                        <i class="bi bi-search fs-5"></i>
                    </a>

                    <div id="auth-buttons" class="d-flex gap-2 flex-nowrap">
                        <a class="btn btn-outline-primary btn-sm d-none d-md-inline-block text-nowrap"
                            href="login.html">Log
                            In</a>
                        <a class="btn btn-primary btn-sm text-nowrap" href="signup.html">Sign Up</a>
                    </div>

                    <button class="btn btn-outline-secondary rounded-circle p-1 lh-1" id="theme-toggle" type="button">
                        <i class="bi bi-sun-fill fs-5" id="theme-icon"></i>
                    </button>

                    <button class="navbar-toggler border-1 p-1 ms-1.5" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div id="profile-placeholder" class= "d-none d-flex align-items-center">
                        <i class="bi bi-person-circle text-primary fs-3" style="cursor: pointer;"></i>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="mb-5">
        <div class="container mt-5">
            <!-- Search UI -->
            <form id="search-form" class="mb-4">
                <div class="input-group input-group-lg">
                    <input id="search-input" name="q" type="search" class="form-control" placeholder="Search movies, TV shows, books, music..." aria-label="Search">
                    <button class="btn btn-primary" type="submit">Search</button>
                </div>

                <div class="btn-group mt-3" role="group" aria-label="filters">
                    <input type="checkbox" class="btn-check" id="filter-movies" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="filter-movies">Movies</label>

                    <input type="checkbox" class="btn-check" id="filter-tv" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="filter-tv">TV Shows</label>

                    <input type="checkbox" class="btn-check" id="filter-books" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="filter-books">Books</label>

                    <input type="checkbox" class="btn-check" id="filter-music" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="filter-music">Music</label>
                </div>
            </form>

            <div id="search-hint" class="text-muted">Choose filters and press <strong>Search</strong>.</div>
        </div>
    </main>

    <footer class="py-5 mt-auto">
        <div class="container d-flex justify-content-between gap-2">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
                <img src="./assets/logo.png" alt="MediaNest" class="logo">
                MediaNest
            </a>
            <div class="d-flex justify-content-end gap-2 align-items-center">
                <i class="bi bi-c-circle"></i>
                <div>2026 MediaNest. All rights reserved.</div>
            </div>
        </div>
    </footer>

    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/search.js"></script>
</body>

</html>

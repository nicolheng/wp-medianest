<!doctype html>
<html lang="en">

<head>
    <title>MediaNest</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
</head>

<body class="d-flex flex-column min-vh-100">
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
            <div class="container d-flex align-items-center flex-wrap flex-lg-nowrap">

                <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
                    <img src="./assets/logo.png" alt="MediaNest" class="logo">
                    MediaNest
                </a>

                <div class="collapse navbar-collapse w-100 order-3 order-lg-2" id="navbarNav">
                    <ul class="navbar-nav ms-lg-3 mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="library.html" id="nav-library">My Library</a></li>
                    </ul>
                </div>

                <div class="d-flex align-items-center gap-2 ms-auto flex-shrink-0 order-2 order-lg-3">

                    <a href="search.html" class="text-secondary hover-primary p-1">
                        <i class="bi bi-search fs-5"></i>
                    </a>

                    <div id="auth-buttons" class="d-flex gap-2 flex-nowrap">
                        <a class="btn btn-outline-primary btn-sm d-none d-md-inline-block text-nowrap"
                            href="login.html">Log
                            In</a>
                        <a class="btn btn-primary btn-sm text-nowrap" href="signup.html">Sign Up</a>
                    </div>

                    

                    <button class="navbar-toggler border-1 p-1 ms-1.5" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <!-- <div id="profile-placeholder" class="d-none dropdown">
                        <button class="btn btn-link text-decoration-none dropdown-toggle text-primary p-0"
                                type="button"
                                data-bs-toggle="dropdown"
                                aria-expanded="false">
                            <i class="bi bi-person-circle fs-4"></i>
                            <span id="nav-username" class="ms-1 d-none d-md-inline small fw-semibold"></span>
                        </button> -->
                    <div id="profile-placeholder" class="d-none dropdown">
                        <button class="btn btn-link p-0 d-flex align-items-center text-decoration-none dropdown-toggle"
                            data-bs-toggle="dropdown">
                            <span id="nav-username" class="me-2 d-none d-md-inline small fw-bold text-white"></span>
                            <img id="nav-profile-pic" src="" class="rounded-circle border border-2 border-primary d-none"
                                style="width: 35px; height: 35px; object-fit: cover;">
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                            <li><a class="dropdown-item py-2" href="profile.html">Profile</a></li>
                            <li><a class="dropdown-item py-2" href="library.html">My Library</a></li>
                            <li><hr class="dropdown-divider my-1"></li>
                            <li>
                                <button class="dropdown-item py-2 text-danger" onclick="handleLogout()">
                                    Logout
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 d-flex align-items-start py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-6">
                
                <div class="d-flex align-items-center gap-2 mb-4">
                    <form id="search-form" action="search_result.html" method="get" class="search-card-refined flex-grow-1 p-1 shadow-sm rounded-pill bg-body border">
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-0 pe-0 ps-3">
                                <i class="bi bi-search text-primary small"></i>
                            </span>
                            <input id="search-input" name="q" type="search" 
                                   class="form-control border-0 bg-transparent shadow-none py-2" 
                                   placeholder="Search MediaNest..." 
                                   aria-label="Search" autofocus>
                            <button class="btn btn-primary rounded-pill px-4 me-1 my-1 btn-sm" type="submit">
                                Search
                            </button>
                        </div>
                    </form>

                    <a href="index.html" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center p-0" 
                       style="width: 42px; height: 42px;" title="Close Search">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>

                <div class="d-flex flex-wrap justify-content-center gap-2" role="group" aria-label="filters">
                    <div class="filter-item">
                        <input type="checkbox" class="btn-check" id="filter-movies" name="filters" value="movies" autocomplete="off">
                        <label class="btn btn-outline-chip-sm rounded-pill" for="filter-movies">
                            <i class="bi bi-film me-1"></i> Movies
                        </label>
                    </div>

                    <div class="filter-item">
                        <input type="checkbox" class="btn-check" id="filter-tv" name="filters" value="tv" autocomplete="off">
                        <label class="btn btn-outline-chip-sm rounded-pill" for="filter-tv">
                            <i class="bi bi-tv me-1"></i> TV
                        </label>
                    </div>

                    <div class="filter-item">
                        <input type="checkbox" class="btn-check" id="filter-books" name="filters" value="books" autocomplete="off">
                        <label class="btn btn-outline-chip-sm rounded-pill" for="filter-books">
                            <i class="bi bi-book me-1"></i> Books
                        </label>
                    </div>

                    <div class="filter-item">
                        <input type="checkbox" class="btn-check" id="filter-music" name="filters" value="music" autocomplete="off">
                        <label class="btn btn-outline-chip-sm rounded-pill" for="filter-music">
                            <i class="bi bi-music-note-beamed me-1"></i> Music
                        </label>
                    </div>
                </div>

                <div id="search-hint" class="text-center mt-5 opacity-25">
                    <i class="bi bi-keyboard fs-4 d-block mb-1"></i>
                    <small class="text-muted">Type and press Enter</small>
                </div>

            </div>
        </div>
    </div>
</main>

<style>
    /* Search Bar Refinement */
    .search-card-refined {
        transition: all 0.2s ease-in-out;
        border: 1px solid #dee2e6 !important;
    }
    
    .search-card-refined:focus-within {
        box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.08) !important;
        border-color: var(--bs-primary) !important;
    }

    /* Small Filter Chips */
    .btn-outline-chip-sm {
        font-size: 0.75rem;
        padding: 0.3rem 0.9rem;
        border: 1px solid #dee2e6;
        color: #6c757d;
        background-color: transparent;
        transition: all 0.2s;
    }

    .btn-check:checked + .btn-outline-chip-sm {
        background-color: var(--bs-primary);
        border-color: var(--bs-primary);
        color: white;
    }

    .btn-outline-chip-sm:hover {
        border-color: var(--bs-primary);
        color: var(--bs-primary);
    }
</style>

    <footer class="py-5 mt-auto">
        <div class="container d-flex justify-content-between gap-2">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
                <img src="./assets/logo.png" alt="MediaNest" class="logo">
                MediaNest
            </a>
            <div class="d-flex justify-content-end gap-2 align-items-center">
                <i class="bi bi-c-circle"></i>
                <div>2026 MediaNest. All rights reserved.</div>
            </div>
        </div>
        <div class="modal" tabindex="-1" id="auth-modal">
            <div class="modal-dialog">
                <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Login Required</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Save movies and track your progress by signing in.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Maybe Later</button>
                    <a type="button" class="btn btn-primary" href="login.html">Login Now</a>
                </div>
                </div>
            </div>
        </div>
    </footer>

    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/search.js"></script>
    <script type="module" src="./js/session.js"></script>
</body>

</html>

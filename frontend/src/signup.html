<!doctype html>
<html lang="en">

<head>
    <title>MediaNest</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
            <div class="container d-flex align-items-center flex-wrap flex-lg-nowrap">

                <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
                    <img src="./assets/logo.png" alt="MediaNest" class="logo">
                    MediaNest
                </a>

                <div class="collapse navbar-collapse w-100 order-3 order-lg-2" id="navbarNav">
                    <ul class="navbar-nav ms-lg-3 mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="library.html" id="nav-library">My Library</a>
                        </li>
                    </ul>
                </div>

                <div class="d-flex align-items-center gap-2 ms-auto flex-shrink-0 order-2 order-lg-3">

                    <a href="search.html" class="text-secondary hover-primary p-1">
                        <i class="bi bi-search fs-5"></i>
                    </a>

                    <div id="auth-buttons" class="d-flex gap-2 flex-nowrap">
                        <a class="btn btn-outline-primary btn-sm d-none d-md-inline-block text-nowrap"
                            href="login.html">Log
                            In</a>
                        <a class="btn btn-primary btn-sm text-nowrap" href="signup.html">Sign Up</a>
                    </div>

                    <button class="btn btn-outline-secondary rounded-circle p-1 lh-1" id="theme-toggle" type="button">
                        <i class="bi bi-sun-fill fs-5" id="theme-icon"></i>
                    </button>

                    <button class="navbar-toggler border-1 p-1 ms-1.5" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div id="profile-placeholder" class="d-none dropdown">
                        <button class="btn btn-link text-decoration-none dropdown-toggle text-primary p-0" type="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle fs-4"></i>
                            <span id="nav-username" class="ms-1 d-none d-md-inline small fw-semibold"></span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                            <li><a class="dropdown-item py-2" href="profile.html">Profile</a></li>
                            <li><a class="dropdown-item py-2" href="library.html">My Library</a></li>
                            <li>
                                <hr class="dropdown-divider my-1">
                            </li>
                            <li>
                                <button class="dropdown-item py-2 text-danger" onclick="handleLogout()">
                                    Logout
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="container d-flex justify-content-center align-items-center min-vh-100">
            <div class="row border rounded-5 p-3 bg-body-tertiary shadow box-area">

                <div class="col-md-6 rounded-4 d-flex justify-content-center align-items-center flex-column left-box">
                    <div class="row align-items-center">
                        <div class="header-text mb-4">
                            <h2>Create an account</h2>
                            <p>Sign up and get started.</p>
                        </div>

                        <form id="signupForm" novalidate onsubmit="handleSignup(event)">
                            <div class="input-group mb-3">
                                <input type="text" id="username" name="username"
                                    class="form-control form-control-lg fs-6" placeholder="Username"
                                    autocomplete="username" required>
                            </div>
                            <div id="usernameError" class="form-text text-danger d-none mb-2"
                                style="font-size: 0.85rem;"></div>
                            <div class="input-group mb-3">
                                <input type="email" id="email" name="email" class="form-control form-control-lg fs-6"
                                    placeholder="Email" autocomplete="email" required>
                            </div>
                            <div id="emailError" class="form-text text-danger d-none mb-2" style="font-size: 0.85rem;">
                            </div>
                            <div id="errorMessage" class="alert alert-danger d-none py-2" style="font-size: 0.9rem;">
                            </div>
                            <div class="input-group mb-2">
                                <input type="password" id="password" name="password"
                                    class="form-control form-control-lg fs-6" placeholder="Password"
                                    autocomplete="current-password" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                                    onclick="togglePasswordVisibility()">
                                    <i class="bi bi-eye-slash" id="eyeIcon"></i>
                                </button>
                            </div>
                            <div id="passwordError" class="form-text text-danger d-none mb-2"
                                style="font-size: 0.85rem;"></div>
                            <div id="passwordHelp" class="mb-4 d-none" style="font-size: 0.8rem;">
                                <p class="mb-1 text-muted" id="length-check">*At least 6 characters</p>
                                <p class="mb-1 text-muted" id="upper-check">*At least one uppercase letter</p>
                            </div>
                            <div class="input-group mb-3">
                                <button class="btn btn-lg auth-button w-100 fs-6">Get Started</button>
                            </div>
                            <div class="row">
                                <small>Have any account? <a href="login.html" class="auth-link">Sign In</a></small>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-md-6 rounded-4 d-flex right-box">
                    <div class="featured-text">
                        <h2>
                            medianest
                        </h2>
                        <p>
                            All your favorites in one place.
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <footer>

    </footer>
    <script type="module" src="./core/globals.js"></script>
    <script type="module" src="./core/auth.js"></script>
    <script type="module" src="./core/session.js"></script>
</body>

</html>

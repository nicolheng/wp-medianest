<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Entertainment Recommendation System</title>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="scss/auth.scss">
    </head>
    <body>
        <header>
            
        </header>
        <main>
            <div class="container d-flex justify-content-center align-items-center min-vh-100">
                <div class="row border rounded-5 p-3 bg-body-tertiary shadow box-area">
                    
                    <div class="col-md-6 rounded-4 d-flex justify-content-center align-items-center flex-column left-box">
                        <div class="row align-items-center">
                            <div class="header-text mb-4">
                                <h2>Create an account</h2>
                                <p>Sign up and get started.</p>
                            </div>
                            <div class="input-group mb-3">
                                <input type="text"
                                        id="username"
                                        name="username"
                                        class="form-control form-control-lg bg-light fs-6"
                                        placeholder="Username"
                                        autocomplete="username"
                                        required>
                            </div>
                            <div class="input-group mb-3">
                                <input type="email"
                                        id="email"
                                        name="email"
                                        class="form-control form-control-lg bg-light fs-6"
                                        placeholder="Email"
                                        autocomplete="email"
                                        required>
                            </div>
                            <div class="input-group mb-5">
                                <input type="password"
                                        id="password"
                                        name="password"
                                        class="form-control form-control-lg bg-light fs-6"
                                        placeholder="Password"
                                        autocomplete="current-password"
                                        required>
                            </div>
                            
                            <div class="input-group mb-3">
                                <button class="btn btn-lg btn-warning w-100 fs-6">Get Started</button>
                            </div>
                            <div class="row">
                                <small>Have any account? <a href="signin.html">Sign In</a></small>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 rounded-4 d-flex right-box">
                        <div class="featured-text">
                            <h2 class="text-white" style="font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 2px; text-transform: uppercase;">
                                medianest
                            </h2>
                            <p class="text-white" style="font-weight: bold; font-size: 1.2rem;">
                                All your favorites in one place.
                            </p>
                        </div>
                    </div>

                </div>
            </div>
            <div class="dark-mode-container">
                <button id="darkModeToggle" class="btn btn-dark shadow-lg rounded-pill px-3 py-2">
                    <i class="bi bi-moon-stars-fill me-2"></i>
                    <span id="toggleText">Dark Mode</span>
                </button>
            </div>
        </main>
        <footer>

        </footer>
        <script type="module" src="./js/main.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Entertainment Recommendation System</title>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            
        </header>
        <main>
            <div class="container d-flex justify-content-center align-items-center min-vh-100">
                <div class="row border rounded-5 p-3 bg-body-tertiary shadow box-area">
                    
                    <div class="col-md-6 rounded-4 d-flex justify-content-center align-items-center flex-column left-box">
                        <div class="row align-items-center">
                            <div class="header-text mb-4">
                                <h2>Sign in with email</h2>
                                <p>Search for movies and check reviews. For free</p>
                            </div>
                            <div class="input-group mb-3">
                                <input type="email"
                                        id="email"
                                        name="email"
                                        class="form-control form-control-lg fs-6"
                                        placeholder="Email"
                                        autocomplete="email"
                                        required>
                            </div>
                            <div class="input-group mb-5">
                                <input type="password"
                                        id="password"
                                        name="password"
                                        class="form-control form-control-lg fs-6"
                                        placeholder="Password"
                                        autocomplete="current-password"
                                        required>
                            </div>
                            <div class="input-group mb-3">
                                <button class="btn btn-lg btn-primary w-100 fs-6">Sign In</button>
                            </div>
                            <div class="row">
                                <small>Don't have an account? <a href="signup.html" class="auth-link">Sign Up</a></small>
                            </div>
                        </div>
                        <div class="d-flex align-items-center my-3 w-100">
                            <div style="flex: 1; height: 1.2px; background-color: var(--bs-border-color);"></div>
                            <span class="mx-3 divider-text fw-bold" style="font-size: 0.8rem;">OR</span>
                            <div style="flex: 1; height: 1.2px; background-color: var(--bs-border-color);"></div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12">
                                <div class="d-flex gap-2">
                                    <button class="btn btn-dark d-flex align-items-center justify-content-center py-2 w-50 mb-2 shadow-sm border-0">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-apple me-2" viewBox="0 0 16 16">
                                            <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.202-.029 2.308-1.179c1.106-1.15 1.148-2.316 1.148-2.316M8.077 5.061c.767 0 1.203-.434 1.203-.434s1.337.192 2.287.967c.711.58 1.055 1.446 1.055 1.446s-1.104.534-1.104 1.937c0 1.412 1.187 1.987 1.187 1.987s-.061.336-.319.933c-.317.731-.772 1.507-1.384 1.507-.694 0-1.022-.425-1.933-.425-1.048 0-1.375.436-2.14.436-.59 0-1.213-.747-1.742-1.774-.59-1.149-1.002-2.315-1.002-3.644 0-2.46 1.444-3.268 2.539-3.268.972 0 1.107.429 1.933.429.356 0 .592-.09.81-.196"/>
                                        </svg>
                                        <span class="fw-bold" style="font-size: 0.9rem;">Continue with Apple</span>
                                    </button>
                                    
                                    <button class="btn btn-outline-secondary d-flex btn-google align-items-center justify-content-center py-2 w-50 mb-2 shadow-sm border">
                                        <img src="https://img.icons8.com/color/20/000000/google-logo.png" class="me-2">
                                        <span class="fw-bold" style="font-size: 0.9rem;">Continue with Google</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        
                    </div>

                    <div class="col-md-6 rounded-4 d-flex right-box">
                        <div class="featured-text">
                            <h2 class="text-white" style="font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 2px; text-transform: uppercase;">
                                welcome back!
                            </h2>
                            <p class="text-white" style="font-weight: bold; font-size: 1.2rem;">
                                All your favorites in one place.
                            </p>
                        </div>
                    </div>

                </div>
            </div>
            <div class="dark-mode-container">
                <button id="theme-toggle" class="btn btn-dark shadow-lg rounded-pill px-3 py-2">
                    <i id="theme-icon" class="bi bi-moon-stars-fill me-2"></i>
                    <span id="toggleText">Dark Mode</span>
                </button>
            </div>
        </main>
        <footer>

        </footer>
        <script type="module" src="./js/main.js"></script>
    </body>
</html>

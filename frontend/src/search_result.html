<!doctype html>
<html lang="en">

<head>
	<title>MediaNest — Search Results</title>
	<link rel="icon" type="image/png" href="./assets/logo.png">
</head>

<body class="d-flex flex-column min-vh-100">
	<header class="sticky-top">
		<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
			<div class="container d-flex align-items-center flex-wrap flex-lg-nowrap">

				<a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
					<img src="./assets/logo.png" alt="MediaNest" class="logo">
					MediaNest
				</a>

				<div class="collapse navbar-collapse w-100 order-3 order-lg-2" id="navbarNav">
					<ul class="navbar-nav ms-lg-3 mb-2 mb-lg-0">
						<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
						<li class="nav-item"><a class="nav-link" href="watchList.html">WatchList</a></li>
					</ul>
				</div>

				<div class="d-flex align-items-center gap-2 ms-auto flex-shrink-0 order-2 order-lg-3">

					<a href="search.html" class="text-secondary hover-primary p-1">
						<i class="bi bi-search fs-5"></i>
					</a>

					<div id="auth-buttons" class="d-flex gap-2 flex-nowrap">
						<a class="btn btn-outline-primary btn-sm d-none d-md-inline-block text-nowrap" href="login.html">Log
							In</a>
						<a class="btn btn-primary btn-sm text-nowrap" href="signup.html">Sign Up</a>
					</div>

					<button class="btn btn-outline-secondary rounded-circle p-1 lh-1" id="theme-toggle" type="button">
						<i class="bi bi-sun-fill fs-5" id="theme-icon"></i>
					</button>

					<button class="navbar-toggler border-1 p-1 ms-1.5" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false">
						<span class="navbar-toggler-icon"></span>
					</button>

					<div id="profile-placeholder" class= "d-none d-flex align-items-center">
						<i class="bi bi-person-circle text-primary fs-3" style="cursor: pointer;"></i>
					</div>
				</div>
			</div>
		</nav>
	</header>

	<main class="mb-5">
		<div class="container mt-5">
			<div id="search-results-page">
				<div class="d-flex align-items-center gap-2 mb-4">
                    <form id="search-form" class="search-card-refined flex-grow-1 p-1 shadow-sm rounded-pill bg-body border">
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-0 pe-0 ps-3">
                                <i class="bi bi-search text-primary small"></i>
                            </span>
                            <input id="search-input" name="q" type="search" 
                                   class="form-control border-0 bg-transparent shadow-none py-2" 
                                   placeholder="Search MediaNest..." 
                                   aria-label="Search" autofocus>
                            <button class="btn btn-primary rounded-pill px-4 me-1 my-1 btn-sm" type="submit">
                                Search
                            </button>
                        </div>
                    </form>

                    <a href="index.html" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center p-0" 
                       style="width: 42px; height: 42px;" title="Close Search">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>

				<h1 id="results-title" class="fs-3 fw-bold mb-3">Results</h1>

				<section id="matches-section" class="mb-4">
					<h2 class="fs-5 fw-bold mb-2">Matches</h2>
					<div id="matches-list" class="d-flex gap-3 overflow-auto"></div>
				</section>

				<section id="other-section" class="mb-4">
					<h2 class="fs-5 fw-bold mb-2">Other</h2>

				<div id="results-loader" class="mb-3 d-none">
					<div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
					<span class="ms-2">Loading results…</span>
				</div>

				<section id="movies-section" class="mb-4">
					<h2 class="fs-5 fw-bold mb-2">Movies</h2>
					<div id="movies-list" class="d-flex gap-3 overflow-auto"></div>
				</section>

				<section id="tv-section" class="mb-4">
					<h2 class="fs-5 fw-bold mb-2">TV Shows</h2>
					<div id="tv-list" class="d-flex gap-3 overflow-auto"></div>
				</section>

				<section id="books-section" class="mb-4">
					<h2 class="fs-5 fw-bold mb-2">Books</h2>
					<div id="books-list" class="d-flex gap-3 overflow-auto"></div>
				</section>

				<section id="music-section" class="mb-4">
					<h2 class="fs-5 fw-bold mb-2">Tracks</h2>
					<div id="music-list" class="d-flex gap-3 overflow-auto"></div>
				</section>
				</section>
				</div>
		</div>
	</main>

	<footer class="py-5 mt-auto">
		<div class="container d-flex justify-content-between gap-2">
			<a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
				<img src="./assets/logo.png" alt="MediaNest" class="logo">
				MediaNest
			</a>
			<div class="d-flex justify-content-end gap-2 align-items-center">
				<i class="bi bi-c-circle"></i>
				<div>2026 MediaNest. All rights reserved.</div>
			</div>
		</div>
	</footer>

	<script type="module" src="./js/main.js"></script>
	<script type="module" src="./js/search.js"></script>
</body>

</html>

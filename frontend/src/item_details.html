<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MediaNest - Details</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
</head>

<body class="d-flex flex-column min-vh-100">
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
            <div class="container d-flex align-items-center flex-wrap flex-lg-nowrap">

                <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
                    <img src="./assets/logo.png" alt="MediaNest" class="logo">
                    MediaNest
                </a>

                <div class="collapse navbar-collapse w-100 order-3 order-lg-2" id="navbarNav">
                    <ul class="navbar-nav ms-lg-3 mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="library.html">My Library</a></li>
                    </ul>
                </div>

                <div class="d-flex align-items-center gap-2 ms-auto flex-shrink-0 order-2 order-lg-3">
                    <a href="search.html" class="text-secondary hover-primary p-1">
                        <i class="bi bi-search fs-5"></i>
                    </a>

                    <div id="auth-buttons" class="d-flex gap-2 flex-nowrap">
                        <a class="btn btn-outline-primary btn-sm d-none d-md-inline-block text-nowrap" href="login.html">Log In</a>
                        <a class="btn btn-primary btn-sm text-nowrap" href="signup.html">Sign Up</a>
                    </div>

                    <button class="btn btn-outline-secondary rounded-circle p-1 lh-1" id="theme-toggle" type="button">
                        <i class="bi bi-sun-fill fs-5" id="theme-icon"></i>
                    </button>

                    <button class="navbar-toggler border-1 p-1 ms-1.5" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div id="profile-placeholder" class="d-none dropdown">
                        <button class="btn btn-link text-decoration-none dropdown-toggle text-primary p-0" 
                                type="button" 
                                data-bs-toggle="dropdown" 
                                aria-expanded="false">
                            <i class="bi bi-person-circle fs-4"></i>
                            <span id="nav-username" class="ms-1 d-none d-md-inline small fw-semibold"></span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                            <li><a class="dropdown-item py-2" href="profile.html">Profile</a></li>
                            <li><a class="dropdown-item py-2" href="library.html">My Library</a></li>
                            <li><hr class="dropdown-divider my-1"></li>
                            <li>
                                <button class="dropdown-item py-2 text-danger" onclick="handleLogout()">
                                    Logout
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 mb-5">
        <div class="container mt-5">
            <div class="row g-4 justify-content-center">
                <div class="col-12 col-md-3 text-center">
                    <img id="item-poster" src="" class="img-fluid rounded-3 shadow-sm" alt="Poster" style="max-height: 400px; object-fit: cover;">
                </div>
                
                <div class="col-12 col-md-7">
                    <h1 id="item-title" class="h2 fw-bold mb-2">Loading...</h1>
                    <p id="item-meta" class="text-muted small mb-3"></p>
                    
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <span id="avg-rating" class="h4 fw-bold mb-0 text-warning">0.0</span>
                        <i id="star-icon" class="bi bi-star-fill text-warning"></i>
                        <span id="total-reviews" class="text-muted small ms-2">0 reviews</span>
                    </div>
                    
                    <h3 id="reviews-section-title" class="fw-bold mb-4">Reviews</h3>

                    <div class="card shadow-sm border-0 bg-body-tertiary">
                        <div class="card-body p-3">
                            <h6 class="fw-bold card-title">Overview</h6>

                            <div id="item-info" class="mt-4 border-top pt-3">
                            </div>
                            
                            <div id="cast-section" class="mt-4 d-none">
                                <h5 class="fw-bold mb-3">Top Cast</h5>
                                <div id="cast-container" class="d-flex gap-3 overflow-auto pb-3" style="scrollbar-width: thin;">
                                </div>
                            </div>

                            <p id="item-description" class="small text-body mb-0 mt-4">Fetching details...</p>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="my-5 opacity-25">

            <div class="row g-4">
                <div class="col-lg-7">
                    <h3 class="h4 fw-bold mb-4">Reviews</h3>
                    <div id="reviews-container"></div>
                </div>

                <div class="col-lg-5">
                    <div id="reviewFormContainer" class="card shadow-sm border-0 p-4 sticky-top bg-body-tertiary" style="top: 100px;">
                        <h5 class="fw-bold mb-3">Rate this item</h5>
                        <form id="reviewForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Score</label>
                                <select class="form-select form-select-sm bg-body border shadow-none" id="ratingSelect" required>
                                    <option value="5">5 - Excellent</option>
                                    <option value="4">4 - Very Good</option>
                                    <option value="3">3 - Average</option>
                                    <option value="2">2 - Poor</option>
                                    <option value="1">1 - Terrible</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Comment</label>
                                <textarea class="form-control form-control-sm bg-body border shadow-none" id="commentText" rows="3"
                                    placeholder="Write a review..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-sm w-100 fw-bold" style="background-color: #FFDE42; color: #212529;">
                                Submit Review
                            </button>
                        </form>
                    </div>
                </div>
        </div>
    </main>

    <footer class="py-5 mt-auto">
        <div class="container d-flex justify-content-between gap-2">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="index.html">
                <img src="./assets/logo.png" alt="MediaNest" class="logo">
                MediaNest
            </a>
            <div class="d-flex justify-content-end gap-2 align-items-center">
                <i class="bi bi-c-circle"></i>
                <div>2026 MediaNest. All rights reserved.</div> 
            </div>
        </div>
    </footer>

    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/details.js"></script>
    <script type="module" src="./js/session.js"></script>
</body>
</html>
